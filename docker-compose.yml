services:
  db:
    image: postgres:16-alpine
    container_name: sukiverse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sukiverseDB
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sukiverseDB"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: sukiverse-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    environment:
      # DB 설정 (localhost → db 서비스로 오버라이드)
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sukiverseDB
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: password

      # OAuth2 시크릿 (.env 파일 또는 직접 입력)
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}

      # JPA 설정 (로컬 개발용 create-drop 방지)
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  postgres_data:
