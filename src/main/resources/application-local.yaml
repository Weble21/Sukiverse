spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/sukiverseDB
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

app:
  cookie:
    secure: false

jwt:
  secret: ${JWT_SECRET:local-dev-secret-key-for-testing-only-minimum-32-chars}

oauth2:
  providers:
    google:
      client-id: ${GOOGLE_CLIENT_ID:local-google-id}
      client-secret: ${GOOGLE_CLIENT_SECRET:local-google-secret}
      redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:3000/login/oauth2/code/google}
    kakao:
      client-id: ${KAKAO_CLIENT_ID:local-kakao-id}
      client-secret: ${KAKAO_CLIENT_SECRET:local-kakao-secret}
      redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:3000/login/oauth2/code/kakao}
    naver:
      client-id: ${NAVER_CLIENT_ID:local-naver-id}
      client-secret: ${NAVER_CLIENT_SECRET:local-naver-secret}
      redirect-uri: ${NAVER_REDIRECT_URI:http://localhost:3000/login/oauth2/code/naver}
